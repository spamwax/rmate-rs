    if: ${{ (github.event_name == 'workflow_dispatch' || (github.ref_type == 'tag' && github.ref_name != 'master')) && (contains(env.RELEASE_JOBS, ',all,') || contains(env.RELEASE_JOBS, ',thumbv7neon-linux-android,')) }}
    uses: ./.forgejo/workflows/reusable_cross.yml
    with:
      target: 'thumbv7neon-linux-androideabi'
      build_type: 'release'
      run_tests: false
      cross: true
  x86_64-freebsd:
    runs-on: ghoolak-docker
    if: ${{ (github.event_name == 'workflow_dispatch' || (github.ref_type == 'tag' && github.ref_name != 'master')) && (contains(env.RELEASE_JOBS, ',all,') || contains(env.RELEASE_JOBS, ',x86_64-freebsd,')) }}
    uses: ./.forgejo/workflows/reusable_cross.yml
    with:
      target: 'x86_64-unknown-freebsd'
      build_type: 'release'
      run_tests: false
      cross: true
  i686-unknown-freebsd:
    runs-on: ghoolak-docker
    if: ${{ (github.event_name == 'workflow_dispatch' || (github.ref_type == 'tag' && github.ref_name != 'master')) && (contains(env.RELEASE_JOBS, ',all,') || contains(env.RELEASE_JOBS, ',i686-unknown-freebsd,')) }}
    uses: ./.forgejo/workflows/reusable_cross.yml
    with:
      target: 'i686-unknown-freebsd'
      build_type: 'release'
      run_tests: false
      cross: true
  x86_64-linux-musl:
    runs-on: ghoolak-docker
    if: ${{ (github.event_name == 'workflow_dispatch' || (github.ref_type == 'tag' && github.ref_name != 'master')) && (contains(env.RELEASE_JOBS, ',all,') || contains(env.RELEASE_JOBS, ',x86_64-linux-musl,')) }}
    uses: ./.forgejo/workflows/reusable_cross.yml
    with:
      target: 'x86_64-unknown-linux-musl'
      build_type: 'release'
      run_tests: false
      cross: true
  aarch64-linux-musl:
    runs-on: ghoolak-docker
    if: ${{ (github.event_name == 'workflow_dispatch' || (github.ref_type == 'tag' && github.ref_name != 'master')) && (contains(env.RELEASE_JOBS, ',all,') || contains(env.RELEASE_JOBS, ',aarch64-linux-musl,')) }}
    uses: ./.forgejo/workflows/reusable_cross.yml
    with:
      target: 'aarch64-unknown-linux-musl'
      build_type: 'release'
      run_tests: false
      cross: true
  armv7-linux-musleabihf:
    runs-on: ghoolak-docker
    if: ${{ (github.event_name == 'workflow_dispatch' || (github.ref_type == 'tag' && github.ref_name != 'master')) && (contains(env.RELEASE_JOBS, ',all,') || contains(env.RELEASE_JOBS, ',armv7-linux-musleabihf,')) }}
    uses: ./.forgejo/workflows/reusable_cross.yml
    with:
      target: 'armv7-unknown-linux-musleabihf'
      build_type: 'release'
      run_tests: false
      cross: true
  i686-linux-musl:
    runs-on: ghoolak-docker
    if: ${{ (github.event_name == 'workflow_dispatch' || (github.ref_type == 'tag' && github.ref_name != 'master')) && (contains(env.RELEASE_JOBS, ',all,') || contains(env.RELEASE_JOBS, ',i686-linux-musl,')) }}
    uses: ./.forgejo/workflows/reusable_cross.yml
    with:
      target: 'i686-unknown-linux-musl'
      build_type: 'release'
      run_tests: false
      cross: true
  # x86_64-macos:
  #   if: ${{ github.ref_type == 'tag' && github.ref_name != 'master' }}
  #   uses: ./.forgejo/workflows/reusable_macos.yml
  #   with:
  #     target: 'x86_64-apple-darwin'
  #     build_type: 'release'
  #     run_tests: false
  # aarch64-macos:
  #   if: ${{ github.ref_type == 'tag' && github.ref_name != 'master' }}
  #   uses: ./.forgejo/workflows/reusable_macos.yml
  #   with:
  #     target: 'aarch64-apple-darwin'
  #     build_type: 'release'
  #     run_tests: false

  gh_release:
    name: Release rmate
    runs-on: ghoolak-docker
    needs:
      - x86_64-linux
      - i686-linux
      - aarch64-linux
      - armv7-linux
      - x86_64-illumos
      - x86_64-linux-android
      - i686-linux-android
      - aarch64-linux-android
      - armv7-linux-android
      - arm-linux-android
      - thumbv7neon-linux-android
      - x86_64-freebsd
      - i686-unknown-freebsd
      - x86_64-linux-musl
      - aarch64-linux-musl
      - armv7-linux-musleabihf
      - i686-linux-musl
      # - x86_64-macos
      # - aarch64-macos

    steps:
      # - uses: https://data.forgejo.org/actions/download-artifact@v3
      #   with:
      #     name: binary-artifact-x86_64-apple-darwin
      # - uses: https://data.forgejo.org/actions/download-artifact@v3
      #   with:
      #     name: binary-artifact-aarch64-apple-darwin
      - uses: https://data.forgejo.org/actions/download-artifact@v3
        with:
          name: binary-artifact-x86_64-unknown-linux-gnu
      - uses: https://data.forgejo.org/actions/download-artifact@v3
        with:
          name: binary-artifact-i686-unknown-linux-gnu
      - uses: https://data.forgejo.org/actions/download-artifact@v3
        with:
          name: binary-artifact-aarch64-unknown-linux-gnu
      - uses: https://data.forgejo.org/actions/download-artifact@v3
        with:
          name: binary-artifact-armv7-unknown-linux-gnueabihf
      - uses: https://data.forgejo.org/actions/download-artifact@v3
        with:
          name: binary-artifact-x86_64-unknown-illumos
      - uses: https://data.forgejo.org/actions/download-artifact@v3
        with:
          name: binary-artifact-x86_64-linux-android
      - uses: https://data.forgejo.org/actions/download-artifact@v3
        with:
          name: binary-artifact-i686-linux-android
      - uses: https://data.forgejo.org/actions/download-artifact@v3
        with:
          name: binary-artifact-aarch64-linux-android
      - uses: https://data.forgejo.org/actions/download-artifact@v3
        with:
          name: binary-artifact-armv7-linux-androideabi
      - uses: https://data.forgejo.org/actions/download-artifact@v3
        with:
          name: binary-artifact-arm-linux-androideabi
      - uses: https://data.forgejo.org/actions/download-artifact@v3
        with:
          name: binary-artifact-thumbv7neon-linux-androideabi
      - uses: https://data.forgejo.org/actions/download-artifact@v3
        with:
          name: binary-artifact-x86_64-unknown-freebsd
      - uses: https://data.forgejo.org/actions/download-artifact@v3
        with:
          name: binary-artifact-i686-unknown-freebsd

      - uses: https://data.forgejo.org/actions/download-artifact@v3
        with:
          name: binary-artifact-x86_64-unknown-linux-musl
      - uses: https://data.forgejo.org/actions/download-artifact@v3
        with:
          name: binary-artifact-aarch64-unknown-linux-musl
      - uses: https://data.forgejo.org/actions/download-artifact@v3
        with:
          name: binary-artifact-armv7-unknown-linux-musleabihf
      - uses: https://data.forgejo.org/actions/download-artifact@v3
        with:
          name: binary-artifact-i686-unknown-linux-musl
      # - run: ls -la /home/runner/work/rmate-rs/rmate-rs || true
      - name: Show downloaded release files
        run: |
          echo "pwd=$(pwd)"
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          find . -maxdepth 3 -type f -name 'rmate_*' -ls
          ls -la "$GITHUB_WORKSPACE" || true
      - uses: https://github.com/softprops/action-gh-release@v2.6.2
        with:
          fail_on_unmatched_files: false
          files: |
            rmate_*.tar.gz
            rmate_*.zip
      - name: Install github CLI
        if: ${{ github.ref_type == 'tag' }}
        run: |
          apt update
          apt install gh jq -y
      - name: Sync missing Forgejo-built assets to GitHub release
        if: ${{ github.ref_type == 'tag' }}
        env:
          GH_TOKEN: ${{ secrets.GH_RELEASE_TOKEN }}
          GITHUB_REPO: spamwax/rmate-rs
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME:-${GITHUB_REF#refs/tags/}}"

          echo "Syncing Forgejo-built release assets to GitHub release: $GITHUB_REPO $tag"
          gh --version

          if ! gh release view "$tag" -R "$GITHUB_REPO" >/dev/null 2>&1; then
            echo "GitHub release $tag does not exist. Creating it."
            gh release create "$tag" \
              -R "$GITHUB_REPO" \
              --verify-tag \
              --title "$tag" \
              --notes "Synced from Forgejo-built release artifacts."
          fi

          mapfile -t github_assets < <(
            gh release view "$tag" \
              -R "$GITHUB_REPO" \
              --json assets \
              -q '.assets[].name'
          )

          shopt -s nullglob
          local_assets=(rmate_*.tar.gz rmate_*.zip)

          if (( ${#local_assets[@]} == 0 )); then
            echo "No local release assets found to sync."
            exit 0
          fi

          missing_assets=()
          for file in "${local_assets[@]}"; do
            asset_name="$(basename "$file")"
            found=false

            for github_asset in "${github_assets[@]}"; do
              if [[ "$github_asset" == "$asset_name" ]]; then
                found=true
                break
              fi
            done

            if [[ "$found" == "true" ]]; then
              echo "GitHub already has $asset_name; skipping."
            else
              echo "GitHub is missing $asset_name; will upload."
              missing_assets+=("$file")
            fi
          done

          if (( ${#missing_assets[@]} == 0 )); then
            echo "GitHub release already has all Forgejo-built assets."
            exit 0
          fi

          printf 'Uploading missing assets to GitHub release %s:\n' "$tag"
          printf '  %s\n' "${missing_assets[@]}"
          gh release upload "$tag" "${missing_assets[@]}" -R "$GITHUB_REPO"
