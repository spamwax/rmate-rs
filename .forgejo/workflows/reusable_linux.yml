name: Reusable workflow for linux

on:
  workflow_call:
    inputs:
      target:
        required: true
        type: string
      arm:
        type: boolean
        default: false
      build_type:
        type: string
        default: "debug"
      run_tests:
        type: boolean
        default: true
      cross:  # Indicate if https://crates.io/crates/cross is needed
        type: boolean
        default: false

env:
  ARM: ${{ inputs.arm }}
  TARGET: ${{ inputs.target }}
  BUILD_TYPE: ${{ inputs.build_type }}
  USE_CROSS: ${{ inputs.cross }}
  RELEASE_COMMIT: ${{ github.ref_type == 'tag' }}
  CROSS_NO_WARNINGS: "0"

jobs:
  build:
    name: rust-${{ matrix.rust }} (${{ inputs.build_type }})
    strategy:
      matrix:
        os: [forgejo-ci-rust:stable]
        rust: [stable]
    runs-on: ghoolak-docker
    container:
      image: ${{ matrix.os }}
    steps:
      - uses: https://data.forgejo.org/actions/checkout@v4
        with:
          submodules: recursive
      - name: Verify prebuilt Rust image
        run: |
          rustc --version
          cargo --version
          rustup target list --installed
          file --version
          pcregrep -V
          qemu-aarch64-static --version || true
          qemu-arm-static --version || true

      - name: Build (${{ inputs.build_type }})
        run: ./.forgejo/workflows/build.sh

      - name: Run test
        if: ${{ inputs.run_tests }}
        run: .forgejo/workflows/run_test.sh

      - name: Prepare release artifact
        if: ${{ github.ref_type == 'tag' && matrix.rust == 'stable' }}
        run: |
          .forgejo/workflows/prepare_artifact.sh

      - name: Upload for release
        id: upload_artifact
        uses: https://data.forgejo.org/actions/upload-artifact@v3
        if: ${{ github.ref_type == 'tag' && matrix.rust == 'stable' }}
        with:
          name: binary-artifact-${{ inputs.target }}
          path: |
            rmate_${{ inputs.target }}.tar.gz
          if-no-files-found: warn
